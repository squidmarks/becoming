# Nginx configuration for M/Y Becoming vessel hub
# Location: /etc/nginx/sites-available/becoming-hub

server {
    listen 80;
    server_name becoming-hub becoming-hub.local 192.168.1.7;

    # Increase timeouts for SignalK WebSockets
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;

    # Root - Vessel Hub landing page (served directly from repo)
    location / {
        root /home/geoff/becoming/apps/vessel-hub;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Note: SignalK is accessed directly on port 3100
    # It cannot be proxied under a subpath due to hardcoded URL paths in its JavaScript
    
    # Vessel Logbook
    location /logbook/ {
        proxy_pass http://localhost:3210/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
    
    # Inverter Monitor
    location /inverter/ {
        proxy_pass http://localhost:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # SSE support for real-time updates
        proxy_buffering off;
        proxy_cache off;
    }

    # AIS Viewer
    location /ais/ {
        proxy_pass http://localhost:8100/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Vessel Data Logger
    location /data-logger/ {
        proxy_pass http://localhost:3200/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # SSE support for real-time updates
        proxy_buffering off;
        proxy_cache off;
    }

    # Logs
    access_log /var/log/nginx/becoming-hub-access.log;
    error_log /var/log/nginx/becoming-hub-error.log;
}
