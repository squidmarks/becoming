; ESP32 Helm Display — M/Y Becoming
; Waveshare ESP32-S3-Touch-LCD-4  (ESP32-S3-N16R8)
; 480×480 IPS, TCA9554PWR IO expander, GT911 touch, CAN/NMEA2000
;
; PLATFORM: pioarduino (Arduino-ESP32 3.x / IDF 5.x)
; Required for OPI PSRAM support on ESP32-S3-N16R8.
;
; Reference code: https://github.com/waveshareteam/ESP32-S3-Touch-LCD-4
; examples/Arduino-v3.3.2/examples/09_LVGL_Widgets  (basis for display/touch setup)

[platformio]
default_envs = waveshare-esp32s3-lcd4

[env]
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
framework = arduino

monitor_speed = 115200
monitor_port  = /dev/tty.usbmodem*

board_build.arduino.memory_type = qio_opi
board_build.flash_size          = 16MB
board_build.partitions          = default_16MB.csv

build_flags =
  -DBOARD_HAS_PSRAM
  -DLV_CONF_INCLUDE_SIMPLE
  -I include
  -DAPP_VERSION=\"0.2.0\"
  -DARDUINO_USB_CDC_ON_BOOT=0   ; do not wait for USB host — boot standalone

lib_deps =
  lvgl/lvgl @ ^8.4.0
  moononournation/GFX Library for Arduino
  links2004/WebSockets @ ^2.4.1
  bblanchon/ArduinoJson @ ^7.2.0
  lewisxhe/SensorLib @ ^0.4.0

[env:waveshare-esp32s3-lcd4]
board            = esp32-s3-devkitc1-n16r8
; upload_port is auto-detected for USB devices — set explicitly if needed:
; upload_port = /dev/cu.usbmodem2101
upload_speed     = 921600
build_src_filter = +<*> -<diagnostic_main.cpp>

build_flags =
  ${env.build_flags}
  -DBOARD_WAVESHARE_ESP32S3_LCD4
  -I include
