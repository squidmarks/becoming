# Nginx configuration for M/Y Becoming vessel hub
# Location: /etc/nginx/sites-available/becoming-hub

server {
    listen 80;
    server_name becoming-hub becoming-hub.local 192.168.1.7;

    # Increase timeouts for SignalK WebSockets
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;

    # Root - Vessel Hub landing page (static site for now)
    location / {
        root /var/www/vessel-hub;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # SignalK Server
    location /signalk/ {
        # Strip /signalk prefix and proxy to SignalK
        rewrite ^/signalk/(.*) /$1 break;
        proxy_pass http://localhost:3100;
        
        # Rewrite redirects to include /signalk prefix
        proxy_redirect ~^/(.*) /signalk/$1;
        proxy_redirect / /signalk/;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Script-Name /signalk;
        proxy_cache_bypass $http_upgrade;
        
        # SignalK WebSocket support
        proxy_buffering off;
        
        # Rewrite HTML content to fix asset paths
        sub_filter 'href="/' 'href="/signalk/';
        sub_filter 'src="/' 'src="/signalk/';
        sub_filter 'src="./' 'src="./';
        sub_filter_once off;
        sub_filter_types text/html text/css application/javascript;
    }

    # Inverter Monitor
    location /inverter/ {
        proxy_pass http://localhost:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # SSE support for real-time updates
        proxy_buffering off;
        proxy_cache off;
    }

    # AIS Viewer
    location /ais/ {
        proxy_pass http://localhost:8100/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Logs
    access_log /var/log/nginx/becoming-hub-access.log;
    error_log /var/log/nginx/becoming-hub-error.log;
}
