<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vessel Data Logger - Data Viewer</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
  <style>
    .autocomplete {
      position: relative;
    }
    
    .autocomplete-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-top: none;
      border-radius: 0 0 6px 6px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 1000;
      box-shadow: var(--shadow-lg);
    }
    
    .autocomplete-item {
      padding: 0.5rem;
      cursor: pointer;
      font-size: 0.875rem;
      font-family: monospace;
      border-bottom: 1px solid var(--border-color);
    }
    
    .autocomplete-item:hover {
      background: var(--bg-secondary);
    }
    
    .autocomplete-item:last-child {
      border-bottom: none;
    }
    
    .selected-paths {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    
    .path-tag {
      background: var(--accent-color);
      color: white;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-family: monospace;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .path-tag button {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      padding: 0;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <h1><i class="fas fa-ship"></i> Vessel Data Logger</h1>
      <div class="header-controls">
        <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i> <span id="theme-text">Dark Mode</span></button>
      </div>
    </div>
  </header>

  <nav>
    <div class="nav-tabs">
      <a href="./">Dashboard</a>
      <a href="config.html">Configuration</a>
      <a href="viewer.html" class="active">Data Viewer</a>
      <a href="retention.html">Retention</a>
    </div>
  </nav>

  <main>
    <div class="card">
      <h2>Query Parameters</h2>
      
      <div class="form-group autocomplete">
        <label>Add Data Path</label>
        <input type="text" id="path-input" placeholder="Start typing to search paths..." oninput="handlePathInput()" onfocus="handlePathInput()">
        <div id="pathAutocomplete" class="autocomplete-list" style="display: none;"></div>
        <small style="color: var(--text-secondary);">Type to search and add paths to graph</small>
      </div>

      <div class="selected-paths" id="selected-paths"></div>

      <div class="form-group">
        <label>Time Range</label>
        <select id="time-preset" onchange="loadData()">
          <option value="1h" selected>Last Hour</option>
          <option value="today">Today</option>
          <option value="yesterday">Yesterday</option>
          <option value="7d">This Week</option>
          <option value="30d">This Month</option>
          <option value="custom">Custom Range</option>
        </select>
      </div>

      <div id="custom-range" style="display: none;">
        <div class="form-group">
          <label>Start Time</label>
          <input type="datetime-local" id="start-time">
        </div>
        <div class="form-group">
          <label>End Time</label>
          <input type="datetime-local" id="end-time">
        </div>
        <button class="btn btn-primary" onclick="loadData()"><i class="fas fa-chart-line"></i> Load Data</button>
      </div>

      <button class="btn btn-secondary" onclick="exportCSV()"><i class="fas fa-download"></i> Export CSV</button>
    </div>

    <div class="card">
      <h2>Data Visualization</h2>
      <div id="chart-container" style="position: relative; height: 400px;">
        <canvas id="data-chart"></canvas>
      </div>
    </div>

    <div class="card">
      <h2>Statistics</h2>
      <div id="statistics"></div>
    </div>
  </main>

  <footer>
    <div class="connection-status">
      <span id="status-message">Select a path and time range to view data</span>
    </div>
  </footer>

  <script>
    let chart = null;
    let currentData = null;
    let allPaths = [];
    let selectedPaths = [];

    function initTheme() {
      const theme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
      updateThemeButton();
      updateChartColors();
    }

    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateThemeButton();
      updateChartColors();
    }

    function updateThemeButton() {
      const theme = document.documentElement.getAttribute('data-theme');
      const icon = document.querySelector('.theme-toggle i');
      const text = document.getElementById('theme-text');
      
      if (theme === 'dark') {
        icon.className = 'fas fa-sun';
        text.textContent = 'Light Mode';
      } else {
        icon.className = 'fas fa-moon';
        text.textContent = 'Dark Mode';
      }
    }

    function updateChartColors() {
      if (chart) {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        chart.options.scales.x.ticks.color = isDark ? '#a0a0a0' : '#666666';
        chart.options.scales.y.ticks.color = isDark ? '#a0a0a0' : '#666666';
        chart.options.scales.x.grid.color = isDark ? '#404040' : '#e0e0e0';
        chart.options.scales.y.grid.color = isDark ? '#404040' : '#e0e0e0';
        chart.update();
      }
    }

    async function loadAllPaths() {
      try {
        const response = await fetch('api/paths?limit=1000');
        const data = await response.json();
        allPaths = data.paths.map(p => p.path);
      } catch (error) {
        console.error('Failed to load paths:', error);
      }
    }

    function handlePathInput() {
      const input = document.getElementById('path-input');
      const value = input.value.toLowerCase();
      const list = document.getElementById('pathAutocomplete');
      
      if (!value) {
        list.style.display = 'none';
        return;
      }
      
      const filtered = allPaths
        .filter(p => p.toLowerCase().includes(value) && !selectedPaths.includes(p))
        .slice(0, 20);
      
      if (filtered.length === 0) {
        list.style.display = 'none';
        return;
      }
      
      list.innerHTML = filtered.map(path => 
        `<div class="autocomplete-item" onclick="addPath('${path}')">${path}</div>`
      ).join('');
      
      list.style.display = 'block';
    }

    function addPath(path) {
      if (!selectedPaths.includes(path)) {
        selectedPaths.push(path);
        renderSelectedPaths();
        document.getElementById('path-input').value = '';
        document.getElementById('pathAutocomplete').style.display = 'none';
        loadData();
      }
    }

    function removePath(path) {
      selectedPaths = selectedPaths.filter(p => p !== path);
      renderSelectedPaths();
      loadData();
    }

    function renderSelectedPaths() {
      const container = document.getElementById('selected-paths');
      
      if (selectedPaths.length === 0) {
        container.innerHTML = '<small style="color: var(--text-secondary);">No paths selected. Add a path to view data.</small>';
        return;
      }
      
      container.innerHTML = selectedPaths.map(path => 
        `<div class="path-tag">
          ${path}
          <button onclick="removePath('${path}')"><i class="fas fa-times"></i></button>
        </div>`
      ).join('');
    }

    function applyTimePreset() {
      const preset = document.getElementById('time-preset').value;
      const customRange = document.getElementById('custom-range');
      
      if (preset === 'custom') {
        customRange.style.display = 'block';
      } else {
        customRange.style.display = 'none';
      }
    }

    function getTimeRange() {
      const preset = document.getElementById('time-preset').value;
      const now = new Date();
      let start, end;

      if (preset === 'custom') {
        const startValue = document.getElementById('start-time').value;
        const endValue = document.getElementById('end-time').value;
        if (!startValue || !endValue) {
          return null;
        }
        return {
          start: new Date(startValue).toISOString(),
          end: new Date(endValue).toISOString()
        };
      }

      if (preset === 'today') {
        start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
        end = now;
      } else if (preset === 'yesterday') {
        const yesterday = new Date(now);
        yesterday.setDate(yesterday.getDate() - 1);
        start = new Date(yesterday.getFullYear(), yesterday.getMonth(), yesterday.getDate(), 0, 0, 0);
        end = new Date(yesterday.getFullYear(), yesterday.getMonth(), yesterday.getDate(), 23, 59, 59);
      } else {
        const presets = {
          '1h': 1 * 60 * 60 * 1000,
          '7d': 7 * 24 * 60 * 60 * 1000,
          '30d': 30 * 24 * 60 * 60 * 1000
        };
        start = new Date(now.getTime() - presets[preset]);
        end = now;
      }

      return {
        start: start.toISOString(),
        end: end.toISOString()
      };
    }

    async function loadData() {
      if (selectedPaths.length === 0) {
        return;
      }

      const timeRange = getTimeRange();
      if (!timeRange) return;

      document.getElementById('status-message').textContent = 'Loading data...';

      try {
        const params = new URLSearchParams({
          path: selectedPaths.join(','),
          start: timeRange.start,
          end: timeRange.end,
          limit: 10000
        });

        const response = await fetch(`/api/history?${params}`);
        const data = await response.json();
        
        currentData = data;
        renderChart(data);
        renderStatistics(data);
        
        document.getElementById('status-message').textContent = `Loaded ${data.count || 0} data points`;
      } catch (error) {
        console.error('Failed to load data:', error);
        document.getElementById('status-message').textContent = 'Failed to load data';
      }
    }

    function renderChart(data) {
      const ctx = document.getElementById('data-chart').getContext('2d');
      
      if (chart) {
        chart.destroy();
      }

      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      const gridColor = isDark ? '#404040' : '#e0e0e0';
      const textColor = isDark ? '#a0a0a0' : '#666666';

      const colors = [
        'rgb(37, 99, 235)',
        'rgb(16, 185, 129)',
        'rgb(245, 158, 11)',
        'rgb(239, 68, 68)',
        'rgb(139, 92, 246)',
        'rgb(236, 72, 153)'
      ];

      let datasets = [];

      if (data.data && Array.isArray(data.data)) {
        datasets.push({
          label: data.path,
          data: data.data.map(point => ({
            x: new Date(point.timestamp),
            y: typeof point.value === 'object' ? JSON.stringify(point.value) : point.value
          })),
          borderColor: colors[0],
          backgroundColor: colors[0] + '20',
          tension: 0.1,
          fill: false
        });
      } else if (data.data && typeof data.data === 'object') {
        let colorIndex = 0;
        for (const [path, points] of Object.entries(data.data)) {
          if (Array.isArray(points) && points.length > 0) {
            datasets.push({
              label: path,
              data: points.map(point => ({
                x: new Date(point.timestamp),
                y: typeof point.value === 'object' ? JSON.stringify(point.value) : point.value
              })),
              borderColor: colors[colorIndex % colors.length],
              backgroundColor: colors[colorIndex % colors.length] + '20',
              tension: 0.1,
              fill: false
            });
            colorIndex++;
          }
        }
      }

      chart = new Chart(ctx, {
        type: 'line',
        data: { datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              labels: {
                color: textColor
              }
            }
          },
          scales: {
            x: {
              type: 'time',
              time: {
                displayFormats: {
                  hour: 'MMM d, HH:mm',
                  day: 'MMM d'
                }
              },
              ticks: { color: textColor },
              grid: { color: gridColor }
            },
            y: {
              ticks: { color: textColor },
              grid: { color: gridColor }
            }
          }
        }
      });
    }

    function renderStatistics(data) {
      const container = document.getElementById('statistics');
      
      if (!data.data) {
        container.innerHTML = '<p class="empty-state">No data to display</p>';
        return;
      }

      const stats = {};

      if (Array.isArray(data.data)) {
        stats[data.path] = calculateStats(data.data);
      } else {
        for (const [path, points] of Object.entries(data.data)) {
          if (Array.isArray(points) && points.length > 0) {
            stats[path] = calculateStats(points);
          }
        }
      }

      const table = document.createElement('table');
      table.innerHTML = `
        <thead>
          <tr>
            <th>Path</th>
            <th>Count</th>
            <th>Min</th>
            <th>Max</th>
            <th>Average</th>
          </tr>
        </thead>
        <tbody>
          ${Object.entries(stats).map(([path, s]) => `
            <tr>
              <td style="font-family: monospace; font-size: 0.75rem;">${path}</td>
              <td>${s.count}</td>
              <td>${s.min !== null ? s.min.toFixed(2) : 'N/A'}</td>
              <td>${s.max !== null ? s.max.toFixed(2) : 'N/A'}</td>
              <td>${s.avg !== null ? s.avg.toFixed(2) : 'N/A'}</td>
            </tr>
          `).join('')}
        </tbody>
      `;

      container.innerHTML = '';
      container.appendChild(table);
    }

    function calculateStats(points) {
      const numericValues = points
        .map(p => p.value)
        .filter(v => typeof v === 'number' && !isNaN(v));

      if (numericValues.length === 0) {
        return { count: points.length, min: null, max: null, avg: null };
      }

      return {
        count: points.length,
        min: Math.min(...numericValues),
        max: Math.max(...numericValues),
        avg: numericValues.reduce((a, b) => a + b, 0) / numericValues.length
      };
    }

    function exportCSV() {
      if (!currentData || !currentData.data) {
        alert('No data to export');
        return;
      }

      let csv = 'Timestamp,Path,Value,Source\n';

      if (Array.isArray(currentData.data)) {
        for (const point of currentData.data) {
          csv += `${point.timestamp},${currentData.path},${point.value},${point.source}\n`;
        }
      } else {
        for (const [path, points] of Object.entries(currentData.data)) {
          for (const point of points) {
            csv += `${point.timestamp},${path},${point.value},${point.source}\n`;
          }
        }
      }

      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `vessel-data-${Date.now()}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    initTheme();
    loadAllPaths();
    renderSelectedPaths();
    
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.autocomplete')) {
        document.getElementById('pathAutocomplete').style.display = 'none';
      }
    });
  </script>
</body>
</html>
