<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events - Vessel Data Logger</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .event-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 2px solid var(--border-color);
    }

    .event-tab {
      padding: 10px 20px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      font-size: 1rem;
      color: var(--text-secondary);
      transition: all 0.2s;
    }

    .event-tab:hover {
      color: var(--text-primary);
    }

    .event-tab.active {
      color: var(--primary-color);
      border-bottom-color: var(--primary-color);
    }

    .event-tab .badge {
      display: inline-block;
      background: var(--primary-color);
      color: white;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      margin-left: 8px;
    }

    .event-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 15px;
      transition: all 0.2s;
    }

    .event-card:hover {
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      transform: translateY(-2px);
    }

    .event-card.active {
      border-left: 4px solid #10b981;
    }

    .event-card.pending {
      border-left: 4px solid #f59e0b;
    }

    .event-card.confirmed {
      border-left: 4px solid #3b82f6;
    }

    .event-card.dismissed {
      opacity: 0.6;
      border-left: 4px solid #6b7280;
    }

    .event-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 15px;
    }

    .event-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
      margin: 0 0 5px 0;
    }

    .event-description {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin: 0;
    }

    .event-status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .event-status.active {
      background: #d1fae5;
      color: #065f46;
    }

    .event-status.pending {
      background: #fef3c7;
      color: #92400e;
    }

    .event-status.confirmed {
      background: #dbeafe;
      color: #1e40af;
    }

    .event-status.dismissed {
      background: #e5e7eb;
      color: #374151;
    }

    .event-meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin: 15px 0;
      padding: 15px;
      background: var(--bg-secondary);
      border-radius: 6px;
    }

    .event-meta-item {
      display: flex;
      flex-direction: column;
    }

    .event-meta-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .event-meta-value {
      font-size: 1rem;
      color: var(--text-primary);
      font-weight: 500;
    }

    .event-data {
      margin-top: 15px;
    }

    .event-data-section {
      margin-bottom: 10px;
    }

    .event-data-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .event-data-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 8px;
    }

    .event-data-item {
      padding: 8px 12px;
      background: var(--bg-primary);
      border-radius: 4px;
      font-size: 0.85rem;
    }

    .event-data-item strong {
      color: var(--text-secondary);
    }

    .event-actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid var(--border-color);
    }

    .event-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .tag {
      display: inline-block;
      padding: 4px 12px;
      background: var(--bg-secondary);
      border-radius: 12px;
      font-size: 0.85rem;
      color: var(--text-primary);
    }

    .event-notes {
      margin-top: 15px;
      padding: 12px;
      background: var(--bg-secondary);
      border-radius: 6px;
      font-size: 0.9rem;
      font-style: italic;
      color: var(--text-secondary);
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
    }

    .modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: var(--bg-primary);
      padding: 30px;
      border-radius: 12px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-title {
      font-size: 1.5rem;
      margin: 0 0 20px 0;
      color: var(--text-primary);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 1rem;
    }

    .form-group textarea {
      min-height: 100px;
      resize: vertical;
    }

    .tag-input-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background: var(--bg-primary);
    }

    .tag-input-container input {
      flex: 1;
      border: none;
      outline: none;
      padding: 4px;
      min-width: 120px;
      background: transparent;
    }

    .tag-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: var(--primary-color);
      color: white;
      border-radius: 12px;
      font-size: 0.85rem;
    }

    .tag-item button {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      padding: 0;
      font-size: 1rem;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 25px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }

    .empty-state i {
      font-size: 3rem;
      margin-bottom: 15px;
      opacity: 0.5;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: var(--text-primary);
    }

    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: inherit;
    }

    .form-group small {
      display: block;
      margin-top: 4px;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .switch-label {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }

    .switch-label input[type="checkbox"] {
      width: auto;
    }

    .switch-label-text {
      font-weight: 500;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <h1><i class="fas fa-ship"></i> Vessel Data Logger</h1>
      <div class="header-controls">
        <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i> <span id="theme-text">Dark Mode</span></button>
      </div>
    </div>
  </header>

  <nav>
    <div class="nav-tabs">
      <a href="./">Dashboard</a>
      <a href="logging.html">Logging</a>
      <a href="events.html" class="active">Events</a>
      <a href="settings.html">Settings</a>
    </div>
  </nav>

  <main>
    <div class="card">
      <h2><i class="fas fa-calendar-alt"></i> Events</h2>
      
      <div class="event-tabs">
        <button class="event-tab active" onclick="switchTab('detectors')">
          <i class="fas fa-cog"></i> Detectors
        </button>
        <button class="event-tab" onclick="switchTab('active')">
          <i class="fas fa-play-circle"></i> Active
          <span class="badge" id="active-count">0</span>
        </button>
        <button class="event-tab" onclick="switchTab('pending')">
          <i class="fas fa-clock"></i> Pending Review
          <span class="badge" id="pending-count">0</span>
        </button>
        <button class="event-tab" onclick="switchTab('history')">
          <i class="fas fa-history"></i> History
        </button>
      </div>

      <div id="detectors-events" class="tab-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <p style="color: var(--text-secondary); margin: 0;">Configure event detectors to automatically track vessel activities</p>
          <button class="btn btn-primary" onclick="openDetectorEditor()">
            <i class="fas fa-plus"></i> Add Detector
          </button>
        </div>
        <div id="detectors-list"></div>
      </div>

      <div id="active-events" class="tab-content" style="display: none;">
        <div class="empty-state">
          <i class="fas fa-inbox"></i>
          <p>No active events</p>
        </div>
      </div>

      <div id="pending-events" class="tab-content" style="display: none;">
        <div class="empty-state">
          <i class="fas fa-inbox"></i>
          <p>No events pending review</p>
        </div>
      </div>

      <div id="history-events" class="tab-content" style="display: none;">
        <div class="empty-state">
          <i class="fas fa-inbox"></i>
          <p>No event history</p>
        </div>
      </div>
    </div>
  </main>

  <!-- Review Modal -->
  <div id="reviewModal" class="modal">
    <div class="modal-content">
      <h2 class="modal-title" id="modalTitle">Review Event</h2>
      
      <div class="form-group">
        <label for="eventNotes">Notes</label>
        <textarea id="eventNotes" placeholder="Add any notes about this event..."></textarea>
      </div>

      <div class="form-group">
        <label for="eventTags">Tags</label>
        <div class="tag-input-container" id="tagContainer">
          <input type="text" id="tagInput" placeholder="Add tag and press Enter">
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-danger" onclick="dismissEvent()">Dismiss</button>
        <button class="btn btn-primary" onclick="confirmEvent()">Confirm</button>
      </div>
    </div>
  </div>

  <!-- Detector Editor Modal -->
  <div id="detectorModal" class="modal">
    <div class="modal-content" style="max-width: 900px;">
      <h2 class="modal-title" id="detectorModalTitle">Add Event Detector</h2>
      
      <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 1rem; margin-bottom: 1rem;">
        <div class="form-group">
          <label for="detectorName">Name *</label>
          <input type="text" id="detectorName" placeholder="e.g., Vessel Underway">
        </div>
        <div class="form-group">
          <label for="detectorId">ID *</label>
          <input type="text" id="detectorId" placeholder="e.g., vessel_underway">
        </div>
      </div>

      <div class="form-group">
        <label for="detectorDescription">Description</label>
        <input type="text" id="detectorDescription" placeholder="Describe when this event occurs">
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <div class="form-group">
          <label for="detectorCategory">Category</label>
          <select id="detectorCategory">
            <option value="navigation">Navigation</option>
            <option value="engine">Engine</option>
            <option value="electrical">Electrical</option>
            <option value="safety">Safety</option>
            <option value="maintenance">Maintenance</option>
            <option value="general">General</option>
          </select>
        </div>
        <div class="form-group">
          <label class="switch-label">
            <input type="checkbox" id="detectorNotifications" checked>
            <div>
              <div class="switch-label-text">Enable Notifications</div>
            </div>
          </label>
        </div>
      </div>

      <div style="border-top: 1px solid var(--border-color); margin: 1.5rem 0; padding-top: 1.5rem;">
        <h3 style="margin-bottom: 1rem;">Start Conditions</h3>
        <div style="display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label for="startPath">Path *</label>
            <input type="text" id="startPath" placeholder="navigation.speedOverGround">
          </div>
          <div class="form-group">
            <label for="startOperator">Operator *</label>
            <select id="startOperator">
              <option value=">">></option>
              <option value=">=">>=</option>
              <option value="<"><</option>
              <option value="<="><=</option>
              <option value="==">==</option>
              <option value="!=">!=</option>
            </select>
          </div>
          <div class="form-group">
            <label for="startValue">Value *</label>
            <input type="number" id="startValue" step="0.1" placeholder="1.0">
          </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 0.5rem;">
          <div class="form-group">
            <label for="startSamples">Consecutive Samples</label>
            <input type="number" id="startSamples" value="3" min="1">
            <small style="color: var(--text-secondary);">Stability check</small>
          </div>
          <div class="form-group">
            <label for="startDuration">Within Duration (s)</label>
            <input type="number" id="startDuration" value="60" min="1">
            <small style="color: var(--text-secondary);">Time window</small>
          </div>
        </div>
      </div>

      <div style="border-top: 1px solid var(--border-color); margin: 1.5rem 0; padding-top: 1.5rem;">
        <h3 style="margin-bottom: 1rem;">End Conditions</h3>
        <div style="display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label for="endPath">Path *</label>
            <input type="text" id="endPath" placeholder="navigation.speedOverGround">
          </div>
          <div class="form-group">
            <label for="endOperator">Operator *</label>
            <select id="endOperator">
              <option value=">">></option>
              <option value=">=">>=</option>
              <option value="<"><</option>
              <option value="<="><=</option>
              <option value="==">==</option>
              <option value="!=">!=</option>
            </select>
          </div>
          <div class="form-group">
            <label for="endValue">Value *</label>
            <input type="number" id="endValue" step="0.1" placeholder="0.5">
          </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 0.5rem;">
          <div class="form-group">
            <label for="endSamples">Consecutive Samples</label>
            <input type="number" id="endSamples" value="6" min="1">
          </div>
          <div class="form-group">
            <label for="endDuration">Within Duration (s)</label>
            <input type="number" id="endDuration" value="300" min="1">
          </div>
        </div>
      </div>

      <div class="modal-actions">
        <button id="deleteDetectorBtn" class="btn btn-danger" onclick="deleteCurrentDetector()" style="display: none; margin-right: auto;">
          <i class="fas fa-trash"></i> Delete
        </button>
        <button class="btn btn-secondary" onclick="closeDetectorEditor()">Cancel</button>
        <button class="btn btn-primary" onclick="saveDetector()">Save</button>
      </div>
    </div>
  </div>

  <script>
    let currentTab = 'detectors';
    let currentEventId = null;
    let eventTags = [];
    let activeEvents = [];
    let pendingEvents = [];

    function initTheme() {
      const theme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
      updateThemeButton();
    }

    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateThemeButton();
    }

    function updateThemeButton() {
      const theme = document.documentElement.getAttribute('data-theme');
      const icon = document.querySelector('.theme-toggle i');
      const text = document.getElementById('theme-text');
      
      if (theme === 'dark') {
        icon.className = 'fas fa-sun';
        text.textContent = 'Light Mode';
      } else {
        icon.className = 'fas fa-moon';
        text.textContent = 'Dark Mode';
      }
    }

    function switchTab(tab) {
      currentTab = tab;
      
      // Update tab buttons
      document.querySelectorAll('.event-tab').forEach(btn => btn.classList.remove('active'));
      event.target.closest('.event-tab').classList.add('active');
      
      // Hide all content
      document.querySelectorAll('.tab-content').forEach(content => content.style.display = 'none');
      
      // Show selected content
      if (tab === 'detectors') {
        document.getElementById('detectors-events').style.display = 'block';
        loadDetectors();
      } else if (tab === 'active') {
        document.getElementById('active-events').style.display = 'block';
        loadActiveEvents();
      } else if (tab === 'pending') {
        document.getElementById('pending-events').style.display = 'block';
        loadPendingEvents();
      } else if (tab === 'history') {
        document.getElementById('history-events').style.display = 'block';
        loadHistoryEvents();
      }
    }

    async function loadDetectors() {
      try {
        const response = await fetch('api/config');
        fullConfig = await response.json();
        const detectors = fullConfig.enhancedEventDetectors || [];
        renderDetectors(detectors);
      } catch (error) {
        console.error('Failed to load detectors:', error);
        document.getElementById('detectors-list').innerHTML = `
          <div class="empty-state">
            <i class="fas fa-exclamation-triangle"></i>
            <p>Failed to load event detectors</p>
          </div>
        `;
      }
    }

    function renderDetectors(detectors) {
      const container = document.getElementById('detectors-list');
      
      if (detectors.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-bell-slash"></i>
            <p>No event detectors configured</p>
          </div>
        `;
        return;
      }

      // Render as table like log configuration
      container.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Type</th>
              <th>Category</th>
              <th>Start Condition</th>
              <th>Notifications</th>
              <th style="text-align: center;">Actions</th>
            </tr>
          </thead>
          <tbody>
            ${detectors.map((detector, index) => `
              <tr onclick="viewDetector(${index})" style="cursor: pointer;">
                <td>
                  <strong>${detector.name}</strong><br>
                  <span style="font-size: 0.85rem; color: var(--text-secondary);">${detector.detectorId}</span>
                </td>
                <td>${detector.type || 'duration'}</td>
                <td>${detector.category || 'general'}</td>
                <td style="font-family: monospace; font-size: 0.85rem;">
                  ${detector.startConditions?.rules?.[0] ? 
                    detector.startConditions.rules[0].path + ' ' + detector.startConditions.rules[0].operator + ' ' + detector.startConditions.rules[0].value :
                    '-'
                  }
                </td>
                <td>
                  ${detector.notifications && detector.notifications.enabled ? 
                    '<span style="color: #10b981;"><i class="fas fa-bell"></i> Enabled</span>' : 
                    '<span style="color: #6b7280;"><i class="fas fa-bell-slash"></i> Disabled</span>'
                  }
                </td>
                <td style="text-align: center;" onclick="event.stopPropagation();">
                  <button class="btn btn-sm btn-danger" onclick="deleteDetector(${index})">
                    <i class="fas fa-trash"></i>
                  </button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    let editingDetectorIndex = null;
    let fullConfig = null;

    function viewDetector(index) {
      openDetectorEditor(index);
    }

    function openDetectorEditor(index = null) {
      editingDetectorIndex = index;
      
      if (index !== null && fullConfig) {
        // Edit existing
        const detector = fullConfig.enhancedEventDetectors[index];
        document.getElementById('detectorModalTitle').textContent = 'Edit Event Detector';
        document.getElementById('detectorId').value = detector.detectorId;
        document.getElementById('detectorName').value = detector.name;
        document.getElementById('detectorDescription').value = detector.description || '';
        document.getElementById('detectorCategory').value = detector.category || 'general';
        document.getElementById('detectorNotifications').checked = detector.notifications?.enabled || false;
        
        // Start conditions (simplified - first rule only)
        const startRule = detector.startConditions?.rules?.[0];
        if (startRule) {
          document.getElementById('startPath').value = startRule.path;
          document.getElementById('startOperator').value = startRule.operator;
          document.getElementById('startValue').value = startRule.value;
        }
        document.getElementById('startSamples').value = detector.stability?.start?.consecutiveSamples || 3;
        document.getElementById('startDuration').value = detector.stability?.start?.withinDuration || 60;
        
        // End conditions (simplified - first rule only)
        const endRule = detector.endConditions?.rules?.[0];
        if (endRule) {
          document.getElementById('endPath').value = endRule.path;
          document.getElementById('endOperator').value = endRule.operator;
          document.getElementById('endValue').value = endRule.value;
        }
        document.getElementById('endSamples').value = detector.stability?.end?.consecutiveSamples || 6;
        document.getElementById('endDuration').value = detector.stability?.end?.withinDuration || 300;
        
        document.getElementById('deleteDetectorBtn').style.display = 'block';
      } else {
        // Add new
        document.getElementById('detectorModalTitle').textContent = 'Add Event Detector';
        document.getElementById('detectorId').value = '';
        document.getElementById('detectorName').value = '';
        document.getElementById('detectorDescription').value = '';
        document.getElementById('detectorCategory').value = 'navigation';
        document.getElementById('detectorNotifications').checked = true;
        document.getElementById('startPath').value = '';
        document.getElementById('startOperator').value = '>';
        document.getElementById('startValue').value = '';
        document.getElementById('startSamples').value = '3';
        document.getElementById('startDuration').value = '60';
        document.getElementById('endPath').value = '';
        document.getElementById('endOperator').value = '<=';
        document.getElementById('endValue').value = '';
        document.getElementById('endSamples').value = '6';
        document.getElementById('endDuration').value = '300';
        document.getElementById('deleteDetectorBtn').style.display = 'none';
      }
      
      document.getElementById('detectorModal').classList.add('active');
    }

    function closeDetectorEditor() {
      document.getElementById('detectorModal').classList.remove('active');
      editingDetectorIndex = null;
    }

    async function saveDetector() {
      const detectorId = document.getElementById('detectorId').value.trim();
      const name = document.getElementById('detectorName').value.trim();
      const startPath = document.getElementById('startPath').value.trim();
      const startValue = document.getElementById('startValue').value;
      const endPath = document.getElementById('endPath').value.trim();
      const endValue = document.getElementById('endValue').value;
      
      if (!detectorId || !name || !startPath || !startValue || !endPath || !endValue) {
        alert('Please fill in all required fields');
        return;
      }

      const detector = {
        detectorId: detectorId,
        name: name,
        description: document.getElementById('detectorDescription').value.trim() || undefined,
        type: 'duration',
        category: document.getElementById('detectorCategory').value,
        notifications: {
          enabled: document.getElementById('detectorNotifications').checked
        },
        stability: {
          start: {
            consecutiveSamples: parseInt(document.getElementById('startSamples').value),
            withinDuration: parseInt(document.getElementById('startDuration').value)
          },
          end: {
            consecutiveSamples: parseInt(document.getElementById('endSamples').value),
            withinDuration: parseInt(document.getElementById('endDuration').value)
          }
        },
        startConditions: {
          operator: 'AND',
          rules: [{
            path: startPath,
            operator: document.getElementById('startOperator').value,
            value: parseFloat(startValue)
          }]
        },
        endConditions: {
          operator: 'AND',
          rules: [{
            path: endPath,
            operator: document.getElementById('endOperator').value,
            value: parseFloat(endValue)
          }]
        }
      };

      if (editingDetectorIndex !== null) {
        fullConfig.enhancedEventDetectors[editingDetectorIndex] = detector;
      } else {
        fullConfig.enhancedEventDetectors.push(detector);
      }

      await saveDetectorConfig();
    }

    async function deleteCurrentDetector() {
      if (editingDetectorIndex === null) return;
      const detector = fullConfig.enhancedEventDetectors[editingDetectorIndex];
      if (!confirm(`Delete "${detector.name}"?`)) return;

      fullConfig.enhancedEventDetectors.splice(editingDetectorIndex, 1);
      closeDetectorEditor();
      await saveDetectorConfig();
    }

    async function saveDetectorConfig() {
      try {
        const response = await fetch('api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(fullConfig)
        });

        if (response.ok) {
          closeDetectorEditor();
          await loadDetectors();
        } else {
          alert('Failed to save detector');
        }
      } catch (error) {
        console.error('Failed to save:', error);
        alert('Failed to save detector');
      }
    }

  <script>

    async function deleteDetector(index) {
      try {
        if (!fullConfig) {
          await loadDetectors();
        }
        
        const detector = fullConfig.enhancedEventDetectors[index];
        if (!confirm(`Delete "${detector.name}"?`)) return;
        
        fullConfig.enhancedEventDetectors.splice(index, 1);
        
        const saveResponse = await fetch('api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(fullConfig)
        });
        
        if (saveResponse.ok) {
          loadDetectors();
        } else {
          alert('Failed to delete detector');
        }
      } catch (error) {
        console.error('Failed to delete detector:', error);
        alert('Failed to delete detector');
      }
    }

    async function loadActiveEvents() {
      try {
        const response = await fetch('api/events/active');
        const data = await response.json();
        activeEvents = data.events || [];
        
        document.getElementById('active-count').textContent = activeEvents.length;
        renderEvents(activeEvents, 'active-events', false);
      } catch (error) {
        console.error('Failed to load active events:', error);
      }
    }

    async function loadPendingEvents() {
      try {
        const response = await fetch('api/events/pending?limit=50');
        const data = await response.json();
        pendingEvents = data.events || [];
        
        document.getElementById('pending-count').textContent = pendingEvents.length;
        renderEvents(pendingEvents, 'pending-events', true);
      } catch (error) {
        console.error('Failed to load pending events:', error);
      }
    }

    async function loadHistoryEvents() {
      // TODO: Implement history query with filters
      const container = document.getElementById('history-events');
      container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>History view coming soon</p></div>';
    }

    function renderEvents(events, containerId, showReviewButton) {
      const container = document.getElementById(containerId);
      
      if (events.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>No events found</p></div>';
        return;
      }

      container.innerHTML = events.map(event => `
        <div class="event-card ${event.state}">
          <div class="event-header">
            <div>
              <h3 class="event-title">${event.name}</h3>
              <p class="event-description">${event.description || ''}</p>
            </div>
            <span class="event-status ${event.state}">${formatState(event.state)}</span>
          </div>

          <div class="event-meta">
            <div class="event-meta-item">
              <span class="event-meta-label">Started</span>
              <span class="event-meta-value">${formatDateTime(event.startTime)}</span>
            </div>
            ${event.endTime ? `
              <div class="event-meta-item">
                <span class="event-meta-label">Ended</span>
                <span class="event-meta-value">${formatDateTime(event.endTime)}</span>
              </div>
              <div class="event-meta-item">
                <span class="event-meta-label">Duration</span>
                <span class="event-meta-value">${formatDuration(event.duration)}</span>
              </div>
            ` : `
              <div class="event-meta-item">
                <span class="event-meta-label">Duration</span>
                <span class="event-meta-value">${formatDuration(Math.floor((Date.now() - new Date(event.startTime).getTime()) / 1000))}</span>
              </div>
            `}
            <div class="event-meta-item">
              <span class="event-meta-label">Category</span>
              <span class="event-meta-value">${event.category || 'General'}</span>
            </div>
          </div>

          ${renderEventData(event)}

          ${event.tags && event.tags.length > 0 ? `
            <div class="event-tags">
              ${event.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
            </div>
          ` : ''}

          ${event.userNotes ? `
            <div class="event-notes">
              <i class="fas fa-sticky-note"></i> ${event.userNotes}
            </div>
          ` : ''}

          ${showReviewButton ? `
            <div class="event-actions">
              <button class="btn btn-primary" onclick="openReviewModal('${event.eventId}')">
                <i class="fas fa-check"></i> Review Event
              </button>
            </div>
          ` : ''}
        </div>
      `).join('');
    }

    function renderEventData(event) {
      let html = '<div class="event-data">';
      
      if (event.startData && Object.keys(event.startData).length > 0) {
        html += '<div class="event-data-section">';
        html += '<div class="event-data-title">Start Data</div>';
        html += '<div class="event-data-grid">';
        for (const [key, value] of Object.entries(event.startData)) {
          html += `<div class="event-data-item"><strong>${formatKey(key)}:</strong> ${formatValue(value)}</div>`;
        }
        html += '</div></div>';
      }
      
      if (event.endData && Object.keys(event.endData).length > 0) {
        html += '<div class="event-data-section">';
        html += '<div class="event-data-title">End Data</div>';
        html += '<div class="event-data-grid">';
        for (const [key, value] of Object.entries(event.endData)) {
          html += `<div class="event-data-item"><strong>${formatKey(key)}:</strong> ${formatValue(value)}</div>`;
        }
        html += '</div></div>';
      }
      
      html += '</div>';
      return html;
    }

    function formatState(state) {
      const states = {
        active: 'Active',
        pending: 'Pending Review',
        confirmed: 'Confirmed',
        dismissed: 'Dismissed',
        auto_confirmed: 'Auto Confirmed'
      };
      return states[state] || state;
    }

    function formatDateTime(timestamp) {
      return new Date(timestamp).toLocaleString('en-US', {
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function formatDuration(seconds) {
      if (!seconds) return '-';
      const hours = Math.floor(seconds / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);
      
      if (hours > 0) {
        return `${hours}h ${minutes}m`;
      }
      return `${minutes}m`;
    }

    function formatKey(key) {
      return key.split('.').pop().replace(/([A-Z])/g, ' $1').trim()
        .split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    }

    function formatValue(value) {
      if (typeof value === 'object' && value !== null) {
        if (value.latitude !== undefined && value.longitude !== undefined) {
          return `${value.latitude.toFixed(6)}, ${value.longitude.toFixed(6)}`;
        }
        return JSON.stringify(value);
      }
      if (typeof value === 'number') {
        return value.toFixed(2);
      }
      return String(value);
    }

    function openReviewModal(eventId) {
      currentEventId = eventId;
      eventTags = [];
      document.getElementById('eventNotes').value = '';
      renderTags();
      document.getElementById('reviewModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('reviewModal').classList.remove('active');
      currentEventId = null;
      eventTags = [];
    }

    function renderTags() {
      const container = document.getElementById('tagContainer');
      const input = document.getElementById('tagInput');
      
      container.innerHTML = eventTags.map(tag => `
        <div class="tag-item">
          ${tag}
          <button onclick="removeTag('${tag}')">×</button>
        </div>
      `).join('');
      
      container.appendChild(input);
    }

    function removeTag(tag) {
      eventTags = eventTags.filter(t => t !== tag);
      renderTags();
    }

    document.getElementById('tagInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const value = e.target.value.trim();
        if (value && !eventTags.includes(value)) {
          eventTags.push(value);
          e.target.value = '';
          renderTags();
        }
      }
    });

    async function confirmEvent() {
      if (!currentEventId) return;
      
      try {
        const notes = document.getElementById('eventNotes').value;
        const response = await fetch(`api/events/${currentEventId}/confirm`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            notes: notes || undefined,
            tags: eventTags.length > 0 ? eventTags : undefined
          })
        });
        
        if (response.ok) {
          closeModal();
          loadPendingEvents();
        }
      } catch (error) {
        console.error('Failed to confirm event:', error);
        alert('Failed to confirm event');
      }
    }

    async function dismissEvent() {
      if (!currentEventId) return;
      if (!confirm('Are you sure you want to dismiss this event?')) return;
      
      try {
        const reason = document.getElementById('eventNotes').value || 'User dismissed';
        const response = await fetch(`api/events/${currentEventId}/dismiss`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ reason })
        });
        
        if (response.ok) {
          closeModal();
          loadPendingEvents();
        }
      } catch (error) {
        console.error('Failed to dismiss event:', error);
        alert('Failed to dismiss event');
      }
    }

    // Initialize
    initTheme();
    loadDetectors(); // Load detectors since it's the default tab
    
    // Refresh active events every 10 seconds
    setInterval(() => {
      if (currentTab === 'active') {
        loadActiveEvents();
      }
    }, 10000);

    // Close modals when clicking outside
    document.getElementById('reviewModal').addEventListener('click', (e) => {
      if (e.target.id === 'reviewModal') {
        closeModal();
      }
    });
    
    document.getElementById('detectorModal').addEventListener('click', (e) => {
      if (e.target.id === 'detectorModal') {
        closeDetectorEditor();
      }
    });
  </script>
</body>
</html>
