<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vessel Data Logger - Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <header>
    <div class="header-content">
      <h1><i class="fas fa-ship"></i> Vessel Data Logger</h1>
      <div class="header-controls">
        <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i> <span id="theme-text">Dark Mode</span></button>
      </div>
    </div>
  </header>

  <nav>
    <div class="nav-tabs">
      <a href="./" class="active">Dashboard</a>
      <a href="logging.html">Logging</a>
      <a href="settings.html">Settings</a>
    </div>
  </nav>

  <main>
    <div class="card">
      <h2>System Status</h2>
      <div class="status-grid">
        <div class="status-item">
          <h3>SignalK Connection</h3>
          <span id="signalk-status" class="status-badge disconnected">Disconnected</span>
        </div>
        <div class="status-item">
          <h3>MongoDB Connection</h3>
          <span id="mongodb-status" class="status-badge disconnected">Disconnected</span>
        </div>
        <div class="status-item">
          <h3>Active Subscriptions</h3>
          <div class="status-value" id="subscriptions-count">-</div>
        </div>
        <div class="status-item">
          <h3>System Uptime</h3>
          <div class="status-value" id="uptime">-</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Storage Statistics</h2>
      <div class="status-grid">
        <div class="status-item">
          <h3>Documents Stored</h3>
          <div class="status-value" id="doc-count">-</div>
        </div>
        <div class="status-item">
          <h3>Storage Size</h3>
          <div class="status-value" id="storage-size">-</div>
        </div>
        <div class="status-item">
          <h3>Cache Entries</h3>
          <div class="status-value" id="cache-entries">-</div>
        </div>
        <div class="status-item">
          <h3>Index Size</h3>
          <div class="status-value" id="index-size">-</div>
        </div>
      </div>
    </div>

  </main>

  <footer>
    <div class="connection-status">
      <div class="connection-indicator">
        <span class="dot" id="signalk-dot"></span>
        <span>SignalK</span>
      </div>
      <div class="connection-indicator">
        <span class="dot" id="mongodb-dot"></span>
        <span>MongoDB</span>
      </div>
    </div>
  </footer>

  <script>
    let eventSource = null;

    function initTheme() {
      const theme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
      updateThemeButton();
    }

    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateThemeButton();
    }

    function updateThemeButton() {
      const theme = document.documentElement.getAttribute('data-theme');
      const icon = document.querySelector('.theme-toggle i');
      const text = document.getElementById('theme-text');
      
      if (theme === 'dark') {
        icon.className = 'fas fa-sun';
        text.textContent = 'Light Mode';
      } else {
        icon.className = 'fas fa-moon';
        text.textContent = 'Dark Mode';
      }
    }

    async function loadStatus() {
      try {
        const response = await fetch('api/status');
        const data = await response.json();

        document.getElementById('signalk-status').textContent = data.signalk.connected ? 'Connected' : 'Disconnected';
        document.getElementById('signalk-status').className = `status-badge ${data.signalk.connected ? 'connected' : 'disconnected'}`;
        document.getElementById('signalk-dot').className = `dot ${data.signalk.connected ? 'connected' : ''}`;

        document.getElementById('mongodb-status').textContent = data.mongodb.connected ? 'Connected' : 'Disconnected';
        document.getElementById('mongodb-status').className = `status-badge ${data.mongodb.connected ? 'connected' : 'disconnected'}`;
        document.getElementById('mongodb-dot').className = `dot ${data.mongodb.connected ? 'connected' : ''}`;

        document.getElementById('subscriptions-count').textContent = data.signalk.subscriptions;
        document.getElementById('uptime').textContent = formatUptime(data.uptime);

        document.getElementById('cache-entries').textContent = data.cache.entries;

        if (data.mongodb.documentsCount !== undefined) {
          document.getElementById('doc-count').textContent = data.mongodb.documentsCount.toLocaleString();
          document.getElementById('storage-size').textContent = data.mongodb.storageSize || '-';
          document.getElementById('index-size').textContent = data.mongodb.indexSize || '-';
        }
      } catch (error) {
        console.error('Failed to load status:', error);
      }
    }

    function formatUptime(seconds) {
      const days = Math.floor(seconds / 86400);
      const hours = Math.floor((seconds % 86400) / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);

      if (days > 0) return `${days}d ${hours}h`;
      if (hours > 0) return `${hours}h ${minutes}m`;
      return `${minutes}m`;
    }

    function connectSSE() {
      eventSource = new EventSource('api/events/stream');

      eventSource.addEventListener('message', (event) => {
        const data = JSON.parse(event.data);
        handleSSEEvent(data);
      });

      eventSource.addEventListener('error', (error) => {
        console.error('SSE connection error:', error);
        eventSource.close();
        setTimeout(connectSSE, 5000);
      });
    }

    function handleSSEEvent(data) {
      if (data.type === 'signalk-connected' || data.type === 'signalk-disconnected') {
        loadStatus();
      }
    }

    initTheme();
    loadStatus();
    connectSSE();
    setInterval(loadStatus, 30000);
  </script>
</body>
</html>
