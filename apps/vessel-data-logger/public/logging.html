<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logging - Vessel Data Logger</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="signalk-autocomplete.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="signalk-autocomplete.js"></script>
  <style>
    .page-tabs {
      display: flex;
      gap: 5px;
      margin-bottom: 20px;
      border-bottom: 2px solid var(--border-color);
    }
    .page-tab {
      padding: 12px 24px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      font-size: 1rem;
      color: var(--text-secondary);
      transition: all 0.2s;
    }
    .page-tab:hover {
      color: var(--text-primary);
    }
    .page-tab.active {
      color: var(--primary-color);
      border-bottom-color: var(--primary-color);
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    iframe {
      width: 100%;
      border: none;
      height: 800px;
      min-height: calc(100vh - 250px);
    }
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
    }
    .modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 2rem;
      max-width: 800px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 1.5rem;
    }
    .modal-header h2 {
      margin: 0;
      flex: 1;
    }
    .close-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-secondary);
    }
    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .form-row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1rem;
    }
    .autocomplete {
      position: relative;
    }
    .autocomplete-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      max-height: 200px;
      overflow-y: auto;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      z-index: 100;
      margin-top: 4px;
    }
    .autocomplete-item {
      padding: 8px 12px;
      cursor: pointer;
      font-family: monospace;
      font-size: 0.9rem;
    }
    .autocomplete-item:hover {
      background: var(--bg-secondary);
    }
    .switch-label {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      user-select: none;
      width: 100%;
    }
    .switch-label input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .switch-label > div {
      flex: 1;
    }
    .switch-label-text {
      font-weight: 500;
      color: var(--text-primary);
    }
    .switch-label-hint {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .modal-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }
    .condition-section {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border-color);
    }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .section-header h3 {
      margin: 0;
    }
    .header-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }
    .header-checkbox input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    .header-checkbox span {
      font-weight: 500;
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <h1><i class="fas fa-ship"></i> Vessel Data Logger</h1>
      <div class="header-controls">
        <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i> <span id="theme-text">Dark Mode</span></button>
      </div>
    </div>
  </header>

  <nav>
    <div class="nav-tabs">
      <a href="./">Dashboard</a>
      <a href="logging.html" class="active">Logging</a>
      <a href="events.html">Events</a>
      <a href="settings.html">Settings</a>
    </div>
  </nav>

  <main>
    <div class="card">
      <h2><i class="fas fa-database"></i> Data Logging</h2>
      
      <div class="page-tabs">
        <button class="page-tab active" onclick="switchPageTab('configuration')">
          <i class="fas fa-cog"></i> Configuration
        </button>
        <button class="page-tab" onclick="switchPageTab('viewer')">
          <i class="fas fa-chart-line"></i> Data Viewer
        </button>
      </div>

      <div id="configuration-tab" class="tab-content active">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <p style="color: var(--text-secondary); margin: 0;">Configure which SignalK paths to log and their thresholds</p>
          <button class="btn btn-primary" onclick="openEditor()">
            <i class="fas fa-plus"></i> Add Path
          </button>
        </div>
        <div id="config-list"></div>
      </div>

      <div id="viewer-tab" class="tab-content">
        <iframe src="viewer-frame.html" id="viewer-frame"></iframe>
      </div>
    </div>
  </main>

  <!-- Logging Configuration Editor Modal -->
  <div id="editorModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Add Logging Path</h2>
        <label class="header-checkbox">
          <input type="checkbox" id="editEnabled" checked>
          <span>Enable Logging</span>
        </label>
        <button class="close-btn" onclick="closeEditor()"><i class="fas fa-times"></i></button>
      </div>

      <div class="form-row">
        <div class="form-group" style="grid-column: 1 / -1;">
          <label>SignalK Path *</label>
          <input type="text" id="editPath" placeholder="Start typing to search paths...">
          <small style="color: var(--text-secondary);">Type to search available SignalK paths</small>
        </div>
      </div>

      <div class="form-row-3">
        <div class="form-group">
          <label>Log Interval (seconds) *</label>
          <input type="number" id="editInterval" min="1" max="3600" value="60">
          <small style="color: var(--text-secondary);">Normal write interval</small>
        </div>

        <div class="form-group">
          <label>Max Interval (seconds)</label>
          <input type="number" id="editMaxInterval" min="0" max="86400" placeholder="Optional">
          <small style="color: var(--text-secondary);">Heartbeat interval</small>
        </div>

        <div class="form-group">
          <label>Delta Threshold</label>
          <input type="number" id="editDeltaThreshold" step="0.01" placeholder="Optional">
          <small style="color: var(--text-secondary);">Min change to log</small>
        </div>
      </div>

      <div class="condition-section">
        <div class="section-header" style="border-bottom: 1px solid var(--border-color); padding-bottom: 0.75rem;">
          <h3>Conditional Logging</h3>
          <label class="header-checkbox">
            <input type="checkbox" id="hasCondition" onchange="toggleConditionFields()">
            <span>Enable Condition</span>
          </label>
        </div>

        <div id="conditionFields" style="display: none;">
          <div class="form-group">
            <label>Condition Path *</label>
            <input type="text" id="editConditionPath" placeholder="Start typing to search paths...">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Operator *</label>
              <select id="editConditionOperator">
                <option value=">">Greater than (>)</option>
                <option value=">=">Greater or equal (>=)</option>
                <option value="<">Less than (<)</option>
                <option value="<=">Less or equal (<=)</option>
                <option value="==">Equal (==)</option>
                <option value="!=">Not equal (!=)</option>
              </select>
            </div>

            <div class="form-group">
              <label>Value *</label>
              <input type="number" id="editConditionValue" step="0.01" placeholder="e.g., 0">
            </div>
          </div>
        </div>
      </div>

      <div class="modal-actions">
        <button id="deleteBtn" class="btn btn-danger" onclick="deleteEntry()" style="display: none; margin-right: auto;"><i class="fas fa-trash"></i> Delete</button>
        <button class="btn btn-secondary" onclick="closeEditor()">Cancel</button>
        <button class="btn btn-primary" onclick="saveEntry()">Save</button>
      </div>
    </div>
  </div>

  <script>
    function initTheme() {
      const theme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
      updateThemeButton();
      // Apply theme to iframes
      const frames = document.querySelectorAll('iframe');
      frames.forEach(frame => {
        frame.addEventListener('load', () => {
          try {
            frame.contentDocument.documentElement.setAttribute('data-theme', theme);
          } catch (e) {
            console.log('Cannot access iframe', e);
          }
        });
      });
    }

    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateThemeButton();
      
      // Update iframes
      const frames = document.querySelectorAll('iframe');
      frames.forEach(frame => {
        try {
          frame.contentDocument.documentElement.setAttribute('data-theme', newTheme);
        } catch (e) {}
      });
    }

    function updateThemeButton() {
      const theme = document.documentElement.getAttribute('data-theme');
      const icon = document.querySelector('.theme-toggle i');
      const text = document.getElementById('theme-text');
      
      if (theme === 'dark') {
        icon.className = 'fas fa-sun';
        text.textContent = 'Light Mode';
      } else {
        icon.className = 'fas fa-moon';
        text.textContent = 'Dark Mode';
      }
    }

    function switchPageTab(tab) {
      // Update tab buttons
      document.querySelectorAll('.page-tab').forEach(btn => btn.classList.remove('active'));
      event.target.closest('.page-tab').classList.add('active');
      
      // Update tab content
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      document.getElementById(tab + '-tab').classList.add('active');
      
      // Load configuration if switching to that tab
      if (tab === 'configuration') {
        loadConfig();
      }
    }

    async function loadConfig() {
      try {
        const response = await fetch('api/config');
        const config = await response.json();
        renderConfig(config.subscriptions || []);
      } catch (error) {
        console.error('Failed to load config:', error);
        document.getElementById('config-list').innerHTML = `
          <div style="text-align: center; padding: 40px; color: var(--text-secondary);">
            <i class="fas fa-exclamation-triangle" style="font-size: 2rem; margin-bottom: 10px;"></i>
            <p>Failed to load configuration</p>
          </div>
        `;
      }
    }

    function renderConfig(subscriptions) {
      const container = document.getElementById('config-list');
      
      if (!subscriptions || subscriptions.length === 0) {
        container.innerHTML = `
          <div style="text-align: center; padding: 40px; color: var(--text-secondary);">
            <i class="fas fa-inbox" style="font-size: 2rem; margin-bottom: 10px;"></i>
            <p>No logging paths configured</p>
          </div>
        `;
        return;
      }

      container.innerHTML = `
        <table>
          <thead>
            <tr>
              <th style="width: 50px;">Enabled</th>
              <th>Path</th>
              <th style="text-align: right;">Interval (s)</th>
              <th style="text-align: right;">Max Interval (s)</th>
              <th style="text-align: right;">Delta</th>
              <th>Condition</th>
            </tr>
          </thead>
          <tbody>
            ${subscriptions.map((sub, index) => `
              <tr style="cursor: pointer;" onclick="openEditor(${index})">
                <td style="text-align: center;">
                  ${sub.enabled ? 
                    '<span style="color: #10b981;"><i class="fas fa-check-circle"></i></span>' : 
                    '<span style="color: #6b7280;"><i class="fas fa-times-circle"></i></span>'
                  }
                </td>
                <td style="font-family: monospace; font-size: 0.9rem;">${sub.path}</td>
                <td style="text-align: right;">${sub.logInterval || '-'}</td>
                <td style="text-align: right;">${sub.maxInterval || '-'}</td>
                <td style="text-align: right;">${sub.deltaThreshold || '-'}</td>
                <td style="font-family: monospace; font-size: 0.85rem; color: var(--text-secondary);">
                  ${sub.condition || '-'}
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    // Editor state
    let editingIndex = null;
    let fullConfig = null;
    let pathAutocomplete = null;
    let conditionPathAutocomplete = null;

    function openEditor(index = null) {
      editingIndex = index;
      
      // Initialize autocomplete for path input (if not already initialized)
      if (!pathAutocomplete) {
        const pathInput = document.getElementById('editPath');
        pathAutocomplete = new SignalKAutocomplete(pathInput);
      }
      
      if (index !== null && fullConfig) {
        // Edit existing
        const sub = fullConfig.subscriptions[index];
        document.getElementById('modalTitle').textContent = 'Edit Logging Path';
        document.getElementById('editPath').value = sub.path;
        document.getElementById('editInterval').value = sub.logInterval || '';
        document.getElementById('editMaxInterval').value = sub.maxInterval || '';
        document.getElementById('editDeltaThreshold').value = sub.deltaThreshold || '';
        document.getElementById('editEnabled').checked = sub.enabled !== false;
        
        if (sub.condition) {
          document.getElementById('hasCondition').checked = true;
          toggleConditionFields();
          const parts = sub.condition.split(' ');
          document.getElementById('editConditionPath').value = parts[0] || '';
          document.getElementById('editConditionOperator').value = parts[1] || '>';
          document.getElementById('editConditionValue').value = parts[2] || '';
        }
        
        document.getElementById('deleteBtn').style.display = 'block';
      } else {
        // Add new
        document.getElementById('modalTitle').textContent = 'Add Logging Path';
        document.getElementById('editPath').value = '';
        document.getElementById('editInterval').value = '60';
        document.getElementById('editMaxInterval').value = '';
        document.getElementById('editDeltaThreshold').value = '';
        document.getElementById('editEnabled').checked = true;
        document.getElementById('hasCondition').checked = false;
        toggleConditionFields();
        document.getElementById('deleteBtn').style.display = 'none';
      }
      
      document.getElementById('editorModal').classList.add('active');
    }

    function closeEditor() {
      document.getElementById('editorModal').classList.remove('active');
      editingIndex = null;
    }

    function toggleConditionFields() {
      const enabled = document.getElementById('hasCondition').checked;
      document.getElementById('conditionFields').style.display = enabled ? 'block' : 'none';
      
      // Initialize autocomplete for condition path when fields are shown
      if (enabled && !conditionPathAutocomplete) {
        const condPathInput = document.getElementById('editConditionPath');
        conditionPathAutocomplete = new SignalKAutocomplete(condPathInput);
      }
    }

    async function saveEntry() {
      const path = document.getElementById('editPath').value.trim();
      if (!path) {
        alert('Path is required');
        return;
      }

      const entry = {
        path: path,
        enabled: document.getElementById('editEnabled').checked,
        logInterval: parseInt(document.getElementById('editInterval').value) || undefined
      };

      const maxInterval = document.getElementById('editMaxInterval').value;
      if (maxInterval) entry.maxInterval = parseInt(maxInterval);

      const deltaThreshold = document.getElementById('editDeltaThreshold').value;
      if (deltaThreshold) entry.deltaThreshold = parseFloat(deltaThreshold);

      if (document.getElementById('hasCondition').checked) {
        const condPath = document.getElementById('editConditionPath').value.trim();
        const condOp = document.getElementById('editConditionOperator').value;
        const condVal = document.getElementById('editConditionValue').value;
        if (condPath && condVal) {
          entry.condition = `${condPath} ${condOp} ${condVal}`;
        }
      }

      if (editingIndex !== null) {
        fullConfig.subscriptions[editingIndex] = entry;
      } else {
        fullConfig.subscriptions.push(entry);
      }

      await saveConfig();
    }

    async function deleteEntry() {
      if (editingIndex === null) return;
      const path = fullConfig.subscriptions[editingIndex].path;
      if (!confirm(`Delete ${path}?`)) return;

      fullConfig.subscriptions.splice(editingIndex, 1);
      closeEditor();
      await saveConfig();
    }

    async function saveConfig() {
      try {
        const response = await fetch('api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(fullConfig)
        });

        if (response.ok) {
          closeEditor();
          await loadConfig();
        } else {
          alert('Failed to save configuration');
        }
      } catch (error) {
        console.error('Failed to save:', error);
        alert('Failed to save configuration');
      }
    }


    async function loadConfig() {
      try {
        const response = await fetch('api/config');
        fullConfig = await response.json();
        renderConfig(fullConfig.subscriptions || []);
      } catch (error) {
        console.error('Failed to load config:', error);
        document.getElementById('config-list').innerHTML = `
          <div style="text-align: center; padding: 40px; color: var(--text-secondary);">
            <i class="fas fa-exclamation-triangle" style="font-size: 2rem; margin-bottom: 10px;"></i>
            <p>Failed to load configuration</p>
          </div>
        `;
      }
    }

    // Close autocomplete when clicking outside
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.autocomplete')) {
        document.getElementById('pathAutocomplete').style.display = 'none';
        document.getElementById('conditionPathAutocomplete').style.display = 'none';
      }
    });

    // Close modal when clicking outside
    window.onclick = function(event) {
      const modal = document.getElementById('editorModal');
      if (event.target === modal) {
        closeEditor();
      }
    }

    initTheme();
    loadConfig();
  </script>
</body>
</html>
