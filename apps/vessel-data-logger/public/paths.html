<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vessel Data Logger - Available Paths</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <header>
    <div class="header-content">
      <h1><i class="fas fa-ship"></i> Vessel Data Logger</h1>
      <div class="header-controls">
        <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i> <span id="theme-text">Dark Mode</span></button>
      </div>
    </div>
  </header>

  <nav>
    <div class="nav-tabs">
      <a href="./">Dashboard</a>
      <a href="config.html">Configuration</a>
      <a href="viewer.html">Data Viewer</a>
      <a href="paths.html" class="active">Available Paths</a>
    </div>
  </nav>

  <main>
    <div class="card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 1rem;">
        <h2>Available SignalK Paths</h2>
        <button class="btn btn-primary" onclick="loadPaths()"><i class="fas fa-sync"></i> Refresh</button>
      </div>

      <div class="form-group">
        <label>Filter by path</label>
        <input type="text" id="filter-input" placeholder="e.g., electrical., navigation.position" onkeyup="handleFilterKeyup(event)">
        <small style="color: var(--text-secondary);">Press Enter to filter</small>
      </div>

      <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem;">
        <button class="btn btn-secondary" onclick="applyFilter('electrical.')"><i class="fas fa-bolt"></i> Electrical</button>
        <button class="btn btn-secondary" onclick="applyFilter('navigation.')"><i class="fas fa-compass"></i> Navigation</button>
        <button class="btn btn-secondary" onclick="applyFilter('environment.')"><i class="fas fa-temperature-high"></i> Environment</button>
        <button class="btn btn-secondary" onclick="applyFilter('propulsion.')"><i class="fas fa-ship"></i> Propulsion</button>
        <button class="btn btn-secondary" onclick="applyFilter('')"><i class="fas fa-list"></i> All</button>
      </div>

      <div id="paths-list">
        <p class="empty-state">Click "Refresh" to load paths from SignalK</p>
      </div>
    </div>
  </main>

  <footer>
    <div class="connection-status">
      <span id="status-message">Ready to load paths</span>
    </div>
  </footer>

  <script>
    let allPaths = [];
    let config = null;

    function initTheme() {
      const theme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
      updateThemeButton();
    }

    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateThemeButton();
    }

    function updateThemeButton() {
      const theme = document.documentElement.getAttribute('data-theme');
      const icon = document.querySelector('.theme-toggle i');
      const text = document.getElementById('theme-text');
      
      if (theme === 'dark') {
        icon.className = 'fas fa-sun';
        text.textContent = 'Light Mode';
      } else {
        icon.className = 'fas fa-moon';
        text.textContent = 'Dark Mode';
      }
    }

    async function loadConfig() {
      try {
        const response = await fetch('api/config');
        config = await response.json();
      } catch (error) {
        console.error('Failed to load config:', error);
      }
    }

    async function loadPaths(filter = '') {
      document.getElementById('status-message').textContent = 'Loading paths...';
      const container = document.getElementById('paths-list');
      container.innerHTML = '<p class="empty-state">Loading...</p>';

      try {
        const params = new URLSearchParams();
        if (filter) params.append('filter', filter);
        params.append('limit', '1000');

        const response = await fetch(`/api/paths?${params}`);
        const data = await response.json();
        
        allPaths = data.paths;
        renderPaths(allPaths);
        
        document.getElementById('status-message').textContent = `Showing ${data.count} of ${data.total} paths`;
      } catch (error) {
        console.error('Failed to load paths:', error);
        container.innerHTML = '<div class="empty-state"><h3>Failed to load paths</h3><p>Make sure SignalK is running and accessible</p></div>';
        document.getElementById('status-message').textContent = 'Failed to load paths';
      }
    }

    function renderPaths(paths) {
      const container = document.getElementById('paths-list');
      
      if (paths.length === 0) {
        container.innerHTML = '<div class="empty-state"><h3>No paths found</h3><p>Try a different filter</p></div>';
        return;
      }

      const table = document.createElement('table');
      table.innerHTML = `
        <thead>
          <tr>
            <th>Path</th>
            <th>Current Value</th>
            <th>Last Update</th>
            <th>Source</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          ${paths.map(path => {
            const isLogged = config?.subscriptions?.some(sub => sub.path === path.path);
            return `
              <tr>
                <td style="font-family: monospace; font-size: 0.75rem;">${path.path}</td>
                <td>${formatValue(path.currentValue)}</td>
                <td>${formatTimestamp(path.lastUpdate)}</td>
                <td>${path.source}</td>
                <td>
                  ${isLogged 
                    ? '<span class="status-badge connected" style="font-size: 0.75rem;"><i class="fas fa-check"></i> Logged</span>'
                    : `<button class="btn btn-success" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;" onclick="addToLogging('${path.path}')"><i class="fas fa-plus"></i> Add</button>`
                  }
                </td>
              </tr>
            `;
          }).join('')}
        </tbody>
      `;

      container.innerHTML = '';
      container.appendChild(table);
    }

    function formatValue(value) {
      if (value === null || value === undefined) return '-';
      if (typeof value === 'object') {
        return JSON.stringify(value).substring(0, 50) + '...';
      }
      if (typeof value === 'number') {
        return value.toFixed(2);
      }
      return String(value);
    }

    function formatTimestamp(timestamp) {
      if (!timestamp) return '-';
      const date = new Date(timestamp);
      const now = new Date();
      const diff = now - date;
      
      if (diff < 60000) return 'Just now';
      if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
      if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
      return date.toLocaleDateString();
    }

    function applyFilter(filter) {
      document.getElementById('filter-input').value = filter;
      loadPaths(filter);
    }

    function handleFilterKeyup(event) {
      if (event.key === 'Enter') {
        const filter = event.target.value;
        loadPaths(filter);
      }
    }

    async function addToLogging(path) {
      if (!config) {
        alert('Failed to load configuration');
        return;
      }

      const interval = prompt('Enter logging interval in seconds:', '60');
      if (!interval) return;

      const description = prompt('Enter description (optional):', '');

      config.subscriptions.push({
        path,
        enabled: true,
        logInterval: parseInt(interval),
        deltaThreshold: null,
        description: description || ''
      });

      try {
        const response = await fetch('api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(config)
        });

        if (response.ok) {
          alert(`✓ Added ${path} to logging configuration`);
          await loadConfig();
          renderPaths(allPaths);
        } else {
          const error = await response.json();
          alert(`Failed to save: ${error.error}`);
        }
      } catch (error) {
        console.error('Failed to add path:', error);
        alert('Failed to add path to logging');
      }
    }

    initTheme();
    loadConfig();
  </script>
</body>
</html>
