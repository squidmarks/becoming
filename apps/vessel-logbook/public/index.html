<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M/Y Becoming - Logbook</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <!-- Left Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>⚓ Logbook</h1>
        <button id="newTripBtn" class="btn btn-primary btn-icon" title="New Trip">➕</button>
      </div>
      
      <div class="trip-list" id="tripList">
        <!-- Trip cards will be inserted here -->
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
      <div id="emptyState" class="empty-state">
        <div class="empty-icon">📋</div>
        <h2>No Trip Selected</h2>
        <p>Select a trip from the sidebar or create a new one</p>
      </div>

      <div id="tripView" class="trip-view" style="display: none;">
        <!-- View Mode -->
        <div id="viewMode" class="view-mode">
          <div class="content-header">
            <h2 id="viewTitle"></h2>
            <div class="header-actions">
              <button id="editBtn" class="btn btn-secondary">✏️ Edit</button>
              <button id="deleteBtn" class="btn btn-danger">🗑️ Delete</button>
            </div>
          </div>
          
          <div id="tripDetail" class="trip-detail">
            <!-- Trip details will be rendered here -->
          </div>
        </div>

        <!-- Edit Mode -->
        <div id="editMode" class="edit-mode" style="display: none;">
          <div class="content-header">
            <h2 id="editTitle">New Trip Log</h2>
            <div class="header-actions">
              <button id="cancelBtn" class="btn btn-secondary">Cancel</button>
              <button id="saveBtn" class="btn btn-primary">💾 Save</button>
            </div>
          </div>

          <form id="tripForm" class="trip-form">
            <!-- Departure Section -->
            <div class="form-section">
              <div class="section-header">
                <h3>🚢 Departure</h3>
                <button type="button" class="btn btn-secondary btn-sm" id="captureStartBtn">
                  📡 Capture Current Conditions
                </button>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label for="startTime">Time *</label>
                  <input type="datetime-local" id="startTime" required>
                </div>
                
                <div class="form-group">
                  <label for="startLocationName">Location Name</label>
                  <input type="text" id="startLocationName" placeholder="e.g., Hilton Head Marina">
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label for="startLat">Latitude</label>
                  <input type="number" id="startLat" step="0.000001" placeholder="32.4285">
                </div>
                
                <div class="form-group">
                  <label for="startLon">Longitude</label>
                  <input type="number" id="startLon" step="0.000001" placeholder="-80.6812">
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label for="startEnginePort">Engine Hours Port</label>
                  <input type="number" id="startEnginePort" step="0.01" placeholder="1234.56">
                </div>
                
                <div class="form-group">
                  <label for="startEngineStbd">Engine Hours Starboard</label>
                  <input type="number" id="startEngineStbd" step="0.01" placeholder="1235.12">
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label for="startFuel">Fuel Level (%)</label>
                  <input type="number" id="startFuel" step="1" min="0" max="100" placeholder="85">
                </div>
              </div>
            </div>

            <!-- Arrival Section -->
            <div class="form-section">
              <div class="section-header">
                <h3>🏁 Arrival</h3>
                <button type="button" class="btn btn-secondary btn-sm" id="captureEndBtn">
                  📡 Capture Current Conditions
                </button>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label for="endTime">Time *</label>
                  <input type="datetime-local" id="endTime" required>
                </div>
                
                <div class="form-group">
                  <label for="endLocationName">Location Name</label>
                  <input type="text" id="endLocationName" placeholder="e.g., Daufuskie Island">
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label for="endLat">Latitude</label>
                  <input type="number" id="endLat" step="0.000001" placeholder="32.1304">
                </div>
                
                <div class="form-group">
                  <label for="endLon">Longitude</label>
                  <input type="number" id="endLon" step="0.000001" placeholder="-80.8766">
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label for="endEnginePort">Engine Hours Port</label>
                  <input type="number" id="endEnginePort" step="0.01" placeholder="1238.06">
                </div>
                
                <div class="form-group">
                  <label for="endEngineStbd">Engine Hours Starboard</label>
                  <input type="number" id="endEngineStbd" step="0.01" placeholder="1238.62">
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label for="endFuel">Fuel Level (%)</label>
                  <input type="number" id="endFuel" step="1" min="0" max="100" placeholder="72">
                </div>
              </div>
            </div>

            <!-- Tags, Crew, Notes -->
            <div class="form-section">
              <h3>📝 Details</h3>

              <div class="form-group">
                <label>Tags</label>
                <div class="tags-input">
                  <button type="button" class="tag-btn" data-tag="marina">🏢 Marina</button>
                  <button type="button" class="tag-btn" data-tag="anchored">⚓ Anchored</button>
                  <button type="button" class="tag-btn" data-tag="mooring">🎯 Mooring Ball</button>
                  <button type="button" class="tag-btn" data-tag="dolphins">🐬 Dolphins</button>
                  <button type="button" class="tag-btn" data-tag="fishing">🎣 Fishing</button>
                  <button type="button" class="tag-btn" data-tag="maintenance">🔧 Maintenance</button>
                </div>
                <div class="custom-tag-input">
                  <input type="text" id="customTag" placeholder="Add custom tag">
                  <button type="button" id="addCustomTagBtn" class="btn btn-secondary btn-sm">Add</button>
                </div>
                <div id="selectedTags" class="selected-tags"></div>
              </div>

              <div class="form-group">
                <label for="crew">Crew (comma-separated)</label>
                <input type="text" id="crew" placeholder="e.g., Geoff, Sarah, Mike">
              </div>

              <div class="form-group">
                <label for="notes">Notes</label>
                <textarea id="notes" rows="4" placeholder="Trip notes, observations, memorable moments..."></textarea>
              </div>
            </div>
          </form>
        </div>
      </div>

      <div id="loadingIndicator" class="loading-indicator" style="display: none;">
        <div class="spinner"></div>
        <p>Loading...</p>
      </div>
    </main>
  </div>

  <!-- Dialog Component (for confirmations only) -->
  <div id="dialogOverlay" class="dialog-overlay">
    <div class="dialog-box">
      <div class="dialog-header">
        <h3 id="dialogTitle">Notification</h3>
      </div>
      <div class="dialog-body">
        <div id="dialogIcon" class="dialog-icon"></div>
        <p id="dialogMessage"></p>
      </div>
      <div class="dialog-footer">
        <button id="dialogCancel" class="btn btn-secondary" style="display: none;">Cancel</button>
        <button id="dialogConfirm" class="btn btn-primary">OK</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="js/app.js"></script>
</body>
</html>
